<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mobile Dev">
  <title>Mobile Dev</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── ÉCRAN DE CONNEXION ─────────────── -->
  <div id="page-login" class="page active login-page">
    <div class="login-wrap">
      <div class="login-logo">🚗</div>
      <div class="login-title">Mobile Dev</div>
      <div class="login-sub">Gestion de vos véhicules</div>
      <button class="btn-google" id="btn-google-login" onclick="signInWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
        Continuer avec Google
      </button>
      <div class="login-hint">Vos données sont sauvegardées<br>dans le cloud, sur votre compte Google.</div>
    </div>
  </div>

  <!-- ── PAGE : ACCUEIL ─────────────────── -->
  <div id="page-home" class="page">
    <div class="topbar">
      <span class="topbar-title">Mobile Dev</span>
      <div class="topbar-actions">
        <div class="icon-btn" id="btn-user" title="Mon compte" onclick="showUserMenu()">👤</div>
      </div>
    </div>
    <div class="v-selector-wrap" id="home-pills"></div>
    <div id="home-panel"></div>
    <div id="home-next-service"></div>
    <div id="home-recent"></div>
  </div>

  <!-- ── PAGE : HISTORIQUE ──────────────── -->
  <div id="page-history" class="page">
    <div class="topbar">
      <span class="topbar-title">Historique</span>
    </div>
    <div class="v-selector-wrap" id="history-pills"></div>
    <div class="filter-bar" id="history-filters"></div>
    <div id="history-timeline"></div>
  </div>

  <!-- ── PAGE : GARAGE ─────────────────── -->
  <div id="page-garage" class="page">
    <div class="topbar">
      <span class="topbar-title">Garage</span>
    </div>
    <div class="garage-list" id="garage-list"></div>
  </div>

  <!-- ── PAGE : STATISTIQUES ───────────── -->
  <div id="page-stats" class="page">
    <div class="topbar">
      <span class="topbar-title">Statistiques</span>
    </div>
    <div class="v-selector-wrap" id="stats-pills"></div>
    <div id="stats-content"></div>
  </div>

  <!-- ── BOTTOM NAV ────────────────────── -->
  <nav class="bottom-nav" id="bottom-nav" style="display:none">
    <div class="nav-item active" data-page="home">
      <span class="nav-ico">🏠</span>
      <span class="nav-lbl">Accueil</span>
    </div>
    <div class="nav-item" data-page="history">
      <span class="nav-ico">📋</span>
      <span class="nav-lbl">Historique</span>
    </div>
    <div class="nav-item" data-page="stats">
      <span class="nav-ico">📊</span>
      <span class="nav-lbl">Stats</span>
    </div>
    <div class="nav-item" data-page="garage">
      <span class="nav-ico">🚗</span>
      <span class="nav-lbl">Garage</span>
    </div>
  </nav>

  <!-- ── MODAL : ENTRÉE ────────────────── -->
  <div class="modal-overlay" id="entry-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="entry-modal-title">Nouvelle entrée</div>
      <div class="modal-body" id="entry-modal-body"></div>
    </div>
  </div>

  <!-- ── MODAL : VÉHICULE ──────────────── -->
  <div class="modal-overlay" id="vehicle-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="vf-modal-title">Nouveau véhicule</div>
      <div class="modal-body" id="vf-modal-body"></div>
    </div>
  </div>

  <!-- ── MODAL : COMPTE ────────────────── -->
  <div class="modal-overlay" id="user-modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title">Mon compte</div>
      <div class="modal-body" id="user-modal-body"></div>
    </div>
  </div>

  <!-- ── LOADER ────────────────────────── -->
  <div id="app-loader">
    <div class="loader-ico">🚗</div>
    <div class="loader-txt">Chargement…</div>
  </div>

  <!-- ── BANNIÈRE MISE À JOUR ──────────────── -->
  <div id="update-banner">
    <span>🆕 Mise à jour disponible</span>
    <button onclick="applyUpdate()">Mettre à jour</button>
  </div>

  <div id="toast"></div>
</div>

<!-- Firebase SDK -->
<script type="module" src="db.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
